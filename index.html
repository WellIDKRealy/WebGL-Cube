<!DOCTYPE html>
<html>
  <head><title>Wasm Bare Metal WebGL</title></head>
  <body style="margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh;">
    <canvas id="canvas" width="600" height="600"></canvas>
    
    <script>
      const canvas = document.getElementById('canvas');
      const gl = canvas.getContext('webgl');

      // Shaders
      const vsSource = `
            attribute vec3 position;
            attribute vec3 color;
            varying vec3 vColor;
            uniform mat4 mvp;
            void main() {
                gl_Position = mvp * vec4(position, 1.0);
                vColor = color;
            }
        `;
      const fsSource = `
            precision mediump float;
            varying vec3 vColor;
            void main() {
                gl_FragColor = vec4(vColor, 1.0);
            }
        `;

      function compileShader(type, source) {
          const shader = gl.createShader(type);
          gl.shaderSource(shader, source);
          gl.compileShader(shader);
          return shader;
      }

      const program = gl.createProgram();
      gl.attachShader(program, compileShader(gl.VERTEX_SHADER, vsSource));
      gl.attachShader(program, compileShader(gl.FRAGMENT_SHADER, fsSource));
      gl.linkProgram(program);
      gl.useProgram(program);

      const mvpLocation = gl.getUniformLocation(program, "mvp");
      
      gl.enable(gl.DEPTH_TEST);
      gl.clearColor(1.0, 1.0, 1.0, 1.0);

      // Engine
      let wasmInstance = null;

      const importObject = {
          env: {
              js_sin: Math.sin,
			  js_cos: Math.cos,
			  js_log_string: (charPtr) => {
				  const memory = new Uint8Array(wasmInstance.exports.memory.buffer);
				  let str = "";
				  while (memory[charPtr] !== 0) {
					  str += String.fromCharCode(memory[charPtr]);
					  charPtr++;
				  }
				  console.log("C String:", str);
			  },
			  js_log_float: (value) => {
				  console.log("C Float:", value);
			  },
              gl_clear: () => {
                  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
              },
              gl_draw_triangles: () => {
                  gl.drawArrays(gl.TRIANGLES, 0, 36);
              },
              gl_update_matrix: (matrixPtr) => {
                  // Read the 16 floats (4x4 matrix) directly from C memory
                  const matrix = new Float32Array(wasmInstance.exports.memory.buffer, matrixPtr, 16);
                  gl.uniformMatrix4fv(mvpLocation, false, matrix);
              }
          }
      };

      WebAssembly.instantiateStreaming(fetch('main.wasm'), importObject).then(result => {
          wasmInstance = result.instance;
          const exports = wasmInstance.exports;

          // Upload the vertex data from C memory to WebGL exactly once
          const vbo = gl.createBuffer();
          gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
          
          const vertices = new Float32Array(
              exports.memory.buffer, 
              exports.get_vertices(), 
              exports.get_vertex_byte_size() / 4 // bytes to float count
          );
          gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

          // Tell WebGL how to read the vertex data (3 floats for pos, 3 for color)
          const posAttrib = gl.getAttribLocation(program, "position");
          gl.enableVertexAttribArray(posAttrib);
          gl.vertexAttribPointer(posAttrib, 3, gl.FLOAT, false, 24, 0);

          const colAttrib = gl.getAttribLocation(program, "color");
          gl.enableVertexAttribArray(colAttrib);
          gl.vertexAttribPointer(colAttrib, 3, gl.FLOAT, false, 24, 12);

          // Start the Render Loop dictated by C
          function loop(time) {
              exports.render_frame(time);
			  requestAnimationFrame(loop);
          }
          requestAnimationFrame(loop);
      });
    </script>
  </body>
</html>
