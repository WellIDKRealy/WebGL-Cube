<!DOCTYPE html>
<html>
  <head><title>Wasm 2D Bouncing Balls</title></head>
  <body style="margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh;">
    <canvas id="canvas" width="600" height="600"></canvas>
    
    <script>
      const canvas = document.getElementById('canvas');
      const gl = canvas.getContext('webgl');

      // 2D Shader Setup
      const vsSource = `
            attribute vec3 position;
            uniform mat4 mvp;
            void main() {
                gl_Position = mvp * vec4(position, 1.0);
            }
        `;
      const fsSource = `
            precision mediump float;
            uniform vec3 uColor;
            void main() {
                gl_FragColor = vec4(uColor, 1.0);
            }
        `;

      function compileShader(type, source) {
          const shader = gl.createShader(type);
          gl.shaderSource(shader, source);
          gl.compileShader(shader);
          return shader;
      }

      const program = gl.createProgram();
      gl.attachShader(program, compileShader(gl.VERTEX_SHADER, vsSource));
      gl.attachShader(program, compileShader(gl.FRAGMENT_SHADER, fsSource));
      gl.linkProgram(program);
      gl.useProgram(program);

      const mvpLocation = gl.getUniformLocation(program, "mvp");
      const colorLocation = gl.getUniformLocation(program, "uColor");
      const posAttrib = gl.getAttribLocation(program, "position");
      
      gl.enableVertexAttribArray(posAttrib);
      gl.clearColor(0.05, 0.05, 0.05, 1.0);

      let wasmInstance = null;
      let circleVBO, boxVBO;

      const importObject = {
		  env: {
			  gl_clear: () => {
				  gl.clear(gl.COLOR_BUFFER_BIT);
			  },
			  gl_set_color: (r, g, b) => {
				  gl.uniform3f(colorLocation, r, g, b);
			  },
			  gl_draw_circle: () => {
				  gl.bindBuffer(gl.ARRAY_BUFFER, circleVBO);
				  gl.vertexAttribPointer(posAttrib, 3, gl.FLOAT, false, 12, 0);
				  gl.drawArrays(gl.TRIANGLE_FAN, 0, 18); // Center + 16 segments + 1 closing point
			  },
			  gl_draw_box: () => {
				  gl.bindBuffer(gl.ARRAY_BUFFER, boxVBO);
				  gl.vertexAttribPointer(posAttrib, 3, gl.FLOAT, false, 12, 0);
				  gl.drawArrays(gl.LINE_LOOP, 0, 4); // 4 corners
			  },
			  gl_update_matrix: (matrixPtr) => {
				  const matrix = new Float32Array(wasmInstance.exports.memory.buffer, matrixPtr, 16);
				  gl.uniformMatrix4fv(mvpLocation, false, matrix);
			  }
		  }
      };

      WebAssembly.instantiateStreaming(fetch('main.wasm'), importObject).then(result => {
		  wasmInstance = result.instance;
		  const exports = wasmInstance.exports;

		  // Tell C to generate the circle/box vertices in its memory
		  exports.init_engine();

		  // Map C Memory to WebGL VBOs
		  circleVBO = gl.createBuffer();
		  gl.bindBuffer(gl.ARRAY_BUFFER, circleVBO);
		  const circleData = new Float32Array(exports.memory.buffer, exports.get_circle_vertices(), 18 * 3);
		  gl.bufferData(gl.ARRAY_BUFFER, circleData, gl.STATIC_DRAW);

		  boxVBO = gl.createBuffer();
		  gl.bindBuffer(gl.ARRAY_BUFFER, boxVBO);
		  const boxData = new Float32Array(exports.memory.buffer, exports.get_box_vertices(), 4 * 3);
		  gl.bufferData(gl.ARRAY_BUFFER, boxData, gl.STATIC_DRAW);

		  // Render Loop
		  function loop(time) {
			  exports.render_frame(time);
			  requestAnimationFrame(loop);
		  }

		  requestAnimationFrame(loop);
      });
    </script>
  </body>
</html>
