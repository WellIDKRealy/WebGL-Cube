<!DOCTYPE html>
<html>
  <head>
    <title>Wasm Bare Metal WebGL Simulation</title>
    <link rel="stylesheet" href="main.css">
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="center-crosshair"></div>
    <div id="log-box">System standby.</div>
    <button id="reset-btn" onclick="triggerReset()">Load Different File</button>

    <div id="upload-overlay" class="overlay">
      <div class="card">
        <h2>Simulation Configuration</h2>
        <p>Please select a configuration file (<code>balls.txt</code>) specifying initial layout positions.</p>
        <input type="file" id="file-input" accept=".txt" style="display:none;">
        <button class="file-btn" onclick="document.getElementById('file-input').click()">Choose File</button>
      </div>
    </div>

    <div id="loading-overlay" class="overlay" style="display: none;">
      <div class="card">
        <h2>Processing Coordinates inside C Engine</h2>
        <div class="progress-container">
          <div id="progress-fill" class="progress-bar"></div>
        </div>
        <div id="progress-text" style="color: #00ff00; font-size: 14px;">0%</div>
      </div>
    </div>
    
    <script src="main.js"></script>
  </body>
</html>
